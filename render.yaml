services:
  - type: web
    name: uniride-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: QR_ENCRYPTION_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: PAYMOB_API_KEY
        sync: false
      - key: PAYMOB_HMAC_SECRET
        sync: false
      - key: PAYMOB_INTEGRATION_ID
        sync: false
      - key: PAYMOB_IFRAME_ID
        sync: false
      - key: FAWRY_MERCHANT_CODE
        sync: false
      - key: FAWRY_SECURITY_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
